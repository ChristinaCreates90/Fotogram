<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotogram</title>
    <link rel="icon" type="image/svg+xml" href="img/Favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./dialog.css">

</head>

<body>

    <header>
        <div class="header-content">
            <img class="logo-img" src="./img/Favicon.svg" alt="Logo Picture">
            <span class="logo-header">Fotogram</span>
        </div>
    </header>

    <main>
        <div>
            <h1>MEIN FOTOALBUM</h1>
        </div>
        <div class="foto-gallery">
            <div class="foto-div" id="imageGallery">
            </div>
        </div>
    </main>
    <footer>
        <div class="footer-content">
            <img class="name-img" src="./img/Name_logo.png" alt="Designer Logo">
            <p>&copy; Christina Ammazzagatti</p>
        </div>

    </footer>

    <div id="body-overlay"></div>
    <div class="dialog" id="dia-dialog">
        <div class="over-dia">
            <div class="pic-description">Image 1</div>
            <button class="close-btn" id="close-button" onclick="dialogClose('dia-dialog')">
                x
            </button>
        </div>

        <div class="img-preview">

        </div>

        <div class="skip-bar">
            <button tabindex="0" class="arrow-click" onclick="prevPic()">&larr;</button>
            <div class="pic-numbers"></div>
            <button tabindex="0" class="arrow-click" onclick="nextPic()">&rarr;</button>
        </div>

    </div>

    <script src="script.js"></script>

</body>


</html>
