<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotogram</title>
    <link rel="icon" type="image/svg+html" href="/img/Favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./dialog.css">

</head>

<body>

    <header>
        <div class="header-content">
            <img class="logo-img" src="./img/Favicon.svg" alt="Logo Picture">
            <h2>Fotogram</h2>
        </div>
    </header>

    <main>
        <div>
            <h1>MEIN FOTOALBUM</h1>
        </div>
        <div class="foto-gallery">
            <div  class="foto-div" onclick="dialogOpen('dia-dialog')">
            </div>
        </div>
    </main>
    <footer>
        <div class="footer-content">
            <img class="name_img" src="./img/Name_logo.png" alt="Designer Logo">
            <p>&copy; Christina Ammazzagatti</p>
        </div>

    </footer>

    <div id="body-overlay"></div>
    <div class="dialog" id="dia-dialog">
        <div class="over-dia">
            <div class="pic-description">Image 1</div>
            <a tabindex="0" href="#" role="button" class="close-btn" onclick="dialogClose('dia-dialog')">x</a>
        </div>

        <div class="img-preview">

        </div>

        <div class="skip-bar">
            <div class="preview-div">
                <a tabindex="0" class="arrow-click" href="#">&larr;</a>
            </div>

            <div class="pic-numbers"></div>

             <div class="next-div">
                <a tabindex="0" class="arrow-click" href="#">&rarr;</a>
            </div>
        </div>

    </div>

    <script src="script.js"></script>

</body>


</html>
